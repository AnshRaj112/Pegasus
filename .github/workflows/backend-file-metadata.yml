name: Sync backend file metadata

on:
  push:
    paths:
      - "pegasus-backend/**/*.py"
      - "pegasus-backend/native/src/**/*.rs"
      - "scripts/sync_backend_file_metadata.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-file-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh backend headers
        run: python scripts/sync_backend_file_metadata.py

      - name: Commit updated headers
        run: |
          if git diff --quiet --exit-code; then
            echo "No header updates needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pegasus-backend
          git commit -m "chore: sync backend file metadata headers"
          git push