# Run backend + frontend together from the repo root:
#   docker compose up --build
#
# UI:  http://127.0.0.1:8080  (nginx proxies /api → backend; override with PEGASUS_UI_PORT)
# API: http://127.0.0.1:8000  (direct backend access, optional)
# Docs (Docker UI on :8080 — **no** `/#/` hash; those are React app routes):
#   http://127.0.0.1:8080/docs
#   http://127.0.0.1:8080/api/docs
#   http://127.0.0.1:8080/openapi.json
#   http://127.0.0.1:8080/api/openapi.json
# Direct backend (:8000): same paths without going through nginx.
#
# Copy docker-compose.override.example.yml → docker-compose.override.yml for extra volume mounts.

services:
  backend:
    build:
      context: ./pegasus-backend
      dockerfile: Dockerfile
    env_file:
      - ./pegasus-backend/.env.backend
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount the real host home (not snap Docker's rewritten $HOME). Set PEGASUS_HOST_HOME in .env.
      - ${PEGASUS_HOST_HOME:-${HOME}}:${PEGASUS_HOST_HOME:-${HOME}}:ro
      # Persist validation job artifacts (mismatch NDJSON) across container restarts.
      - pegasus-validation-jobs:/var/lib/pegasus/validation-jobs
    environment:
      PEGASUS_VALIDATION_JOBS_DIRECTORY: /var/lib/pegasus/validation-jobs
      PEGASUS_VALIDATION_ALLOW_LOCAL_PATHS: "true"
      PEGASUS_VALIDATION_LOCAL_PATH_HOST_PREFIX: ""
      PEGASUS_VALIDATION_LOCAL_PATH_CONTAINER_PREFIX: ""
      # GCS: stream-only chunked spill (no full-object download); warm worker pool
      PEGASUS_VALIDATION_ENABLE_IN_MEMORY_RECONCILE: "false"
      PEGASUS_VALIDATION_GCS_STREAMING_ONLY: "true"
      PEGASUS_VALIDATION_WORKER_POOL_SIZE: "2"
      PEGASUS_VALIDATION_SKIP_ARTIFACT_REPORT: "true"
      PEGASUS_VALIDATION_ENABLE_CONTENT_DIGEST_PRECHECK: "false"
      PEGASUS_VALIDATION_STREAM_MISMATCHES_TO_DISK: "true"
      PEGASUS_VALIDATION_RECONCILIATION_PARTITION_BUCKETS: "256"
      PEGASUS_VALIDATION_PARTITION_RECONCILE_WORKERS: "0"
      PEGASUS_VALIDATION_QUEUE_RAM_MULTIPLIER: "1.5"
      PEGASUS_VALIDATION_TARGET_DURATION_SECONDS: "180"
      PEGASUS_VALIDATION_RECONCILIATION_CHUNK_ROWS: "1000000"
      PEGASUS_VALIDATION_TABULAR_ENABLE_COLUMN_DRILLDOWN: "true"
      PEGASUS_VALIDATION_PROGRESS_STATUS_INTERVAL_SECONDS: "5"
      PEGASUS_VALIDATION_RECONCILIATION_PARTITION_WAVE_SIZE: "64"
      PEGASUS_VALIDATION_MAX_CONCURRENCY: "1"
      PEGASUS_VALIDATION_AUTO_TUNE_ENABLED: "true"
      PEGASUS_VALIDATION_PERSISTENCE_MAX_MISMATCH_ROWS: "50000"
      PEGASUS_VALIDATION_LARGE_JOB_BYTES: "8589934592"
      PEGASUS_VALIDATION_PARTITION_RECONCILE_USE_PROCESSES: "true"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - pegasus

  frontend:
    build:
      context: ./pegasus-frontend
      dockerfile: Dockerfile
      args:
        # Empty → browser calls same-origin /api/... through nginx (no CORS setup required).
        VITE_API_BASE: ""
    ports:
      # Default 8080 avoids clashing with local Vite on 5173. Set PEGASUS_UI_PORT=5173 if Vite is stopped.
      - "${PEGASUS_UI_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pegasus

networks:
  pegasus:
    driver: bridge

volumes:
  pegasus-validation-jobs:
