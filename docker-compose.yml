# Run backend + frontend together from the repo root:
#   docker compose up --build
#
# UI:  http://127.0.0.1:8080  (nginx proxies /api → backend; override with PEGASUS_UI_PORT)
# API: http://127.0.0.1:8000  (direct access, optional)
#
# Copy docker-compose.override.example.yml → docker-compose.override.yml for extra volume mounts.

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    networks:
      - pegasus
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./pegasus-backend
      dockerfile: Dockerfile
    env_file:
      - ./pegasus-backend/.env.backend
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount the real host home (not snap Docker's rewritten $HOME). Set PEGASUS_HOST_HOME in .env.
      - ${PEGASUS_HOST_HOME:-${HOME}}:${PEGASUS_HOST_HOME:-${HOME}}:ro
      - pegasus_spill:/tmp/pegasus_job_workspace
      - pegasus_jobs:/tmp/pegasus_validation_jobs
    environment:
      PEGASUS_VALIDATION_ALLOW_LOCAL_PATHS: "true"
      PEGASUS_VALIDATION_LOCAL_PATH_HOST_PREFIX: ""
      PEGASUS_VALIDATION_LOCAL_PATH_CONTAINER_PREFIX: ""
      PEGASUS_VALIDATION_JOBS_DIRECTORY: "/tmp/pegasus_validation_jobs"
      # API-only: dispatch jobs to validation-worker via Redis (no in-container subprocess)
      PEGASUS_VALIDATION_DISTRIBUTED_QUEUE_URL: "redis://redis:6379/0"
      PEGASUS_VALIDATION_SPAWN_LOCAL_WORKERS: "false"
      PEGASUS_VALIDATION_ENABLE_IN_MEMORY_RECONCILE: "false"
      PEGASUS_VALIDATION_GCS_STREAMING_ONLY: "true"
      PEGASUS_VALIDATION_WORKER_POOL_SIZE: "0"
      PEGASUS_VALIDATION_MAX_CONCURRENCY: "3"
      PEGASUS_VALIDATION_MAX_CONCURRENT_JOBS: "3"
      PEGASUS_VALIDATION_MIN_CPU_PER_JOB: "0.5"
      PEGASUS_VALIDATION_CPU_RESERVE_FRACTION: "0.5"
      PEGASUS_VALIDATION_JOB_TIMEOUT_SECONDS: "0"
      PEGASUS_VALIDATION_MAX_READ_CHUNK_BYTES: "52428800"
      PEGASUS_VALIDATION_AUTO_TUNE_ENABLED: "true"
      PEGASUS_VALIDATION_UTILIZATION_SLACK: "0.70"
      PEGASUS_VALIDATION_CLEANUP_WORKSPACE_ON_COMPLETE: "true"
      PEGASUS_VALIDATION_GLOBAL_MEMORY_BUDGET_BYTES: "7516192768"
      PEGASUS_VALIDATION_MEMORY_BUDGET_BYTES: "7516192768"
      PEGASUS_VALIDATION_API_MEMORY_RESERVE_BYTES: "2147483648"
      PEGASUS_VALIDATION_LARGE_JOB_SUBPROCESS_BYTES: "10737418240"
      PEGASUS_VALIDATION_QUEUE_RAM_RESERVE_BYTES: "2147483648"
      PEGASUS_VALIDATION_CPU_RESERVE_CORES: "1"
      # Fair scheduler: worker applies cgroup v2 cpu.max when /sys/fs/cgroup is writable.
      # For strict per-job quotas in Docker, run validation-worker with cgroup delegation
      # (e.g. --cgroupns=host or a privileged cgroup mount); otherwise affinity fallback applies.
      PEGASUS_VALIDATION_SKIP_ARTIFACT_REPORT: "true"
      PEGASUS_VALIDATION_ENABLE_CONTENT_DIGEST_PRECHECK: "true"
      PEGASUS_VALIDATION_RECONCILIATION_PARTITION_BUCKETS: "1024"
      PEGASUS_VALIDATION_RECONCILIATION_CHUNK_ROWS: "500000"
      PEGASUS_VALIDATION_PARTITION_RECONCILE_WORKERS: "1"
      PEGASUS_VALIDATION_QUEUE_RAM_MULTIPLIER: "1.5"
      PEGASUS_VALIDATION_TARGET_DURATION_SECONDS: "300"
      PEGASUS_VALIDATION_PROGRESS_STATUS_INTERVAL_SECONDS: "5"
    depends_on:
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    networks:
      - pegasus

  validation-worker:
    build:
      context: ./pegasus-backend
      dockerfile: Dockerfile
    env_file:
      - ./pegasus-backend/.env.backend
    command: ["python", "-m", "pegasus.validation.distributed_worker_main"]
    # cgroup v2 cpu.max for per-job CPU shares requires a writable unified cgroup hierarchy.
    cgroupns_mode: host
    volumes:
      - ${PEGASUS_HOST_HOME:-${HOME}}:${PEGASUS_HOST_HOME:-${HOME}}:ro
      - pegasus_spill:/tmp/pegasus_job_workspace
      - pegasus_jobs:/tmp/pegasus_validation_jobs
    environment:
      PEGASUS_VALIDATION_ALLOW_LOCAL_PATHS: "true"
      PEGASUS_VALIDATION_LOCAL_PATH_HOST_PREFIX: ""
      PEGASUS_VALIDATION_LOCAL_PATH_CONTAINER_PREFIX: ""
      PEGASUS_VALIDATION_JOBS_DIRECTORY: "/tmp/pegasus_validation_jobs"
      PEGASUS_VALIDATION_DISTRIBUTED_QUEUE_URL: "redis://redis:6379/0"
      PEGASUS_VALIDATION_SPAWN_LOCAL_WORKERS: "false"
      PEGASUS_VALIDATION_ENABLE_IN_MEMORY_RECONCILE: "false"
      PEGASUS_VALIDATION_GCS_STREAMING_ONLY: "true"
      PEGASUS_VALIDATION_WORKER_POOL_SIZE: "0"
      PEGASUS_VALIDATION_GLOBAL_MEMORY_BUDGET_BYTES: "7516192768"
      PEGASUS_VALIDATION_MEMORY_BUDGET_BYTES: "7516192768"
      PEGASUS_VALIDATION_API_MEMORY_RESERVE_BYTES: "2147483648"
      PEGASUS_VALIDATION_RECONCILIATION_PARTITION_BUCKETS: "1024"
      PEGASUS_VALIDATION_RECONCILIATION_CHUNK_ROWS: "500000"
      PEGASUS_VALIDATION_PARTITION_RECONCILE_WORKERS: "1"
      PEGASUS_VALIDATION_SKIP_ARTIFACT_REPORT: "true"
      PEGASUS_VALIDATION_ENABLE_CONTENT_DIGEST_PRECHECK: "true"
      PEGASUS_VALIDATION_TARGET_DURATION_SECONDS: "300"
      PEGASUS_VALIDATION_MAX_CONCURRENT_JOBS: "3"
      PEGASUS_VALIDATION_MIN_CPU_PER_JOB: "0.5"
      PEGASUS_VALIDATION_CPU_RESERVE_FRACTION: "0.5"
    depends_on:
      - redis
      - backend
    deploy:
      resources:
        limits:
          memory: 11G
          cpus: "4"
        reservations:
          memory: 2G
    networks:
      - pegasus

  frontend:
    build:
      context: ./pegasus-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    ports:
      - "${PEGASUS_UI_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pegasus

networks:
  pegasus:
    driver: bridge

volumes:
  pegasus_spill:
  pegasus_jobs:
