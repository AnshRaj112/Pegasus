# Copy to docker-compose.override.yml to expose extra host directories to the API.
# Compose merges this file automatically when present.
#
#   cp docker-compose.override.example.yml docker-compose.override.yml
#   # edit volumes, then: docker compose up --build
#
# Local CSV paths: set PEGASUS_HOST_HOME in repo-root .env to your real home (passwd),
# especially when using snap Docker — otherwise ${HOME} may point at ~/snap/docker/... .

services:
  backend:
    volumes:
      # Example: shared drive or paths outside your home directory
      - /mnt/shared-csv:/mnt/shared-csv:ro
      # Example: project test data at a fixed in-container alias (requires path remap in .env.backend)
      # - ./test-data:/data/pegasus:ro
