<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EB4C4C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d83e3e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" />
  
  <!-- Left wing -->
  <path d="M 30 45 Q 15 40 10 50 Q 15 55 30 50 Z" fill="white" opacity="0.85" />
  
  <!-- Right wing -->
  <path d="M 70 45 Q 85 40 90 50 Q 85 55 70 50 Z" fill="white" opacity="0.85" />
  
  <!-- Horse silhouette -->
  <g transform="translate(50, 55)">
    <!-- Muzzle -->
    <ellipse cx="12" cy="2" rx="7" ry="5" fill="white" />
    
    <!-- Head -->
    <circle cx="0" cy="-8" r="12" fill="white" />
    
    <!-- Ear -->
    <polygon points="0,-20 -3,-28 3,-22" fill="white" />
    
    <!-- Neck -->
    <path d="M -4 2 L -6 12 L 2 13 L 3 2 Z" fill="white" />
  </g>
</svg>