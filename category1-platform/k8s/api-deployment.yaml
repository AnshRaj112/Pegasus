apiVersion: apps/v1
kind: Deployment
metadata:
  name: category1-api
  namespace: category1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: category1-api
  template:
    metadata:
      labels:
        app: category1-api
    spec:
      containers:
        - name: api
          image: category1-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: category1-config
          volumeMounts:
            - name: work-data
              mountPath: /data/category1
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: work-data
          persistentVolumeClaim:
            claimName: category1-work-data
---
apiVersion: v1
kind: Service
metadata:
  name: category1-api
  namespace: category1
spec:
  selector:
    app: category1-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: category1-work-data
  namespace: category1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
