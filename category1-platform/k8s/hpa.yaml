apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: category1-worker-hpa
  namespace: category1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: category1-worker
  minReplicas: 2
  maxReplicas: 32
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
