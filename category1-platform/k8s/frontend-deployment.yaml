apiVersion: apps/v1
kind: Deployment
metadata:
  name: category1-frontend
  namespace: category1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: category1-frontend
  template:
    metadata:
      labels:
        app: category1-frontend
    spec:
      containers:
        - name: frontend
          image: category1-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: category1-frontend
  namespace: category1
spec:
  selector:
    app: category1-frontend
  ports:
    - port: 80
      targetPort: 80
