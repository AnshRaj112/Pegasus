services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CATEGORY1_WORK_DIR=/data/category1
      - CATEGORY1_MEMORY_LIMIT_MB=1024
      - CATEGORY1_NUM_PARTITIONS=1024
    volumes:
      - category1-data:/data/category1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  category1-data:
