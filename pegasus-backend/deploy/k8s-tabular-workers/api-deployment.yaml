apiVersion: apps/v1
kind: Deployment
metadata:
  name: pegasus-api
  namespace: pegasus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pegasus-api
  template:
    metadata:
      labels:
        app: pegasus-api
    spec:
      containers:
        - name: api
          image: pegasus-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: pegasus-config
          volumeMounts:
            - name: work-data
              mountPath: /data/category1
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: work-data
          persistentVolumeClaim:
            claimName: category1-work-data
---
apiVersion: v1
kind: Service
metadata:
  name: pegasus-api
  namespace: pegasus
spec:
  selector:
    app: pegasus-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pegasus-work-data
  namespace: pegasus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
