apiVersion: v1
kind: ConfigMap
metadata:
  name: pegasus-config
  namespace: pegasus
data:
  CATEGORY1_CHUNK_SIZE: "10000"
  CATEGORY1_NUM_PARTITIONS: "4096"
  CATEGORY1_MEMORY_LIMIT_MB: "8192"
  CATEGORY1_SPILL_THRESHOLD_PCT: "0.75"
  CATEGORY1_WORK_DIR: "/data/category1"
  CATEGORY1_MAX_CONCURRENT_PARTITIONS: "4"
  REDIS_URL: "redis://pegasus-redis:6379/0"
  PEGASUS_VALIDATION_DISTRIBUTED_QUEUE_URL: "redis://pegasus-redis:6379/0"
  PEGASUS_VALIDATION_JOBS_DIRECTORY: "/data/validation_jobs"
  PEGASUS_VALIDATION_AUTO_TUNE_ENABLED: "true"
  PEGASUS_VALIDATION_MAX_CONCURRENCY: "10"
  PEGASUS_VALIDATION_UTILIZATION_SLACK: "0.70"
  PEGASUS_VALIDATION_CLEANUP_WORKSPACE_ON_COMPLETE: "true"
  PEGASUS_VALIDATION_GCS_STREAMING_ONLY: "true"
  PEGASUS_VALIDATION_ENABLE_IN_MEMORY_RECONCILE: "false"
