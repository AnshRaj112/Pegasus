apiVersion: apps/v1
kind: Deployment
metadata:
  name: pegasus-worker
  namespace: pegasus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pegasus-worker
  template:
    metadata:
      labels:
        app: pegasus-worker
    spec:
      containers:
        - name: worker
          image: pegasus-backend:latest
          command: ["python", "-m", "category1.workers.partition_worker"]
          envFrom:
            - configMapRef:
                name: pegasus-config
          volumeMounts:
            - name: work-data
              mountPath: /data/category1
          resources:
            requests:
              cpu: 2
              memory: 4Gi
              ephemeral-storage: 50Gi
            limits:
              cpu: 4
              memory: 10Gi
              ephemeral-storage: 200Gi
      volumes:
        - name: work-data
          persistentVolumeClaim:
            claimName: pegasus-work-data
