apiVersion: apps/v1
kind: Deployment
metadata:
  name: pegasus-worker
  namespace: pegasus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pegasus-worker
  template:
    metadata:
      labels:
        app: pegasus-worker
    spec:
      containers:
        - name: worker
          image: pegasus-backend:latest
          command: ["python", "-m", "pegasus.validation.workers.partition_worker"]
          envFrom:
            - configMapRef:
                name: pegasus-config
          env:
            - name: PEGASUS_VALIDATION_DISTRIBUTED_ENABLED
              value: "true"
            - name: PEGASUS_VALIDATION_WORK_DIR
              value: "/data/pegasus/work"
          volumeMounts:
            - name: work-data
              mountPath: /data/pegasus/work
          resources:
            requests:
              cpu: 2
              memory: 4Gi
              ephemeral-storage: 10Gi
            limits:
              cpu: 4
              memory: 10Gi
              ephemeral-storage: 50Gi
      volumes:
        - name: work-data
          persistentVolumeClaim:
            claimName: pegasus-work-data
