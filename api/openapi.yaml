          type: integer
          title: Max Concurrency
          description: User-set parallel cap (0 = no fixed cap; resource advisor decides)
        effective_max_concurrency:
          type: integer
          title: Effective Max Concurrency
          description: Parallel slots the drain loop uses right now (resource recommendation when auto-tune is on and max_concurrency
            is 0)
        cpu_cores_available:
          type: integer
          title: Cpu Cores Available
          description: Logical CPU cores detected on the server
        auto_tune_enabled:
          type: boolean
          title: Auto Tune Enabled
          description: Whether resource-based auto-tuning is active
        threads_per_job:
          type: integer
          title: Threads Per Job
          description: Configured worker threads per validation job (0 = auto / all cores)
        disk_headroom_multiplier:
          type: number
          title: Disk Headroom Multiplier
          description: Configured disk headroom multiplier per validation job
        effective_threads_per_job:
          type: integer
          title: Effective Threads Per Job
          description: Resolved thread cap used when a worker starts (after auto=host cores)
        pending:
          type: integer
          title: Pending
          description: Jobs waiting in the queue
        running:
          type: integer
          title: Running
          description: Jobs currently executing
        finished:
          type: integer
          title: Finished
          description: Completed/failed jobs still tracked in memory
        total_tracked:
          type: integer
          title: Total Tracked
          description: Total jobs tracked in memory
        resource_advisor:
          additionalProperties: true
          type: object
          title: Resource Advisor
          description: 'Live resource snapshot: system RAM/disk/swap stats, per-job estimates, safe limits (max_safe_by_ram,
            max_safe_by_disk, max_safe_by_cpu), and the system-recommended max_concurrency.'
        jobs:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Jobs
          description: Recent job snapshots
      type: object
      required:
      - max_concurrency
      - effective_max_concurrency
      - cpu_cores_available
      - auto_tune_enabled
      - threads_per_job
      - disk_headroom_multiplier
      - effective_threads_per_job
      - pending
      - running
      - finished
      - total_tracked
