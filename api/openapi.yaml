        project_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Project Id
        credentials_json:
          type: string
          minLength: 2
          title: Credentials Json
        active:
          type: boolean
          title: Active
          default: true
      type: object
      required:
      - name
      - credentials_json
      title: CloudConnectionCreateRequest
    CloudConnectionResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
        provider:
          type: string
          title: Provider
        bucket:
          type: string
          title: Bucket
        project_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Project Id
        active:
          type: boolean
          title: Active
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
