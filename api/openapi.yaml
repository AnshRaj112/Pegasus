        result:
          anyOf:
          - $ref: '#/components/schemas/ValidateResponse'
          - type: 'null'
        batch_result:
          anyOf:
          - $ref: '#/components/schemas/BatchValidateResponse'
          - type: 'null'
          description: Present when the job was queued via POST /validate/local/batch
        resource_profile:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Resource Profile
          description: Memory, disk, and CPU footprint snapshots captured before, during, and after validation. Includes peak
            RSS, job workspace disk usage, and CPU utilization samples.
      type: object
      required:
      - status
      title: ValidationJobDetailResponse
      description: 'Poll response: while running only *status* is set; when completed *result* contains the API payload.'
    ValidationOptionsResponse:
      properties:
        test_modes:
          items:
            $ref: '#/components/schemas/ValidationTestMode'
          type: array
          title: Test Modes
          description: Test modes exposed in the validation wizard.
        mismatch_snippet_limit_default:
          type: integer
          maximum: 50.0
          minimum: 1.0
          title: Mismatch Snippet Limit Default
        mismatch_snippet_limit_max:
          type: integer
          maximum: 50.0
          minimum: 1.0
          title: Mismatch Snippet Limit Max
      type: object
      required:
      - mismatch_snippet_limit_default
      - mismatch_snippet_limit_max
      title: ValidationOptionsResponse
      description: Public validation wizard options (snippet caps and supported test modes).
    ValidationSummary:
      properties:
        source_row_count:
          type: integer
          minimum: 0.0
          title: Source Row Count
        target_row_count:
          type: integer
          minimum: 0.0
          title: Target Row Count
        compared_column_count:
          type: integer
          minimum: 0.0
          title: Compared Column Count
          description: Shared non-UID columns considered in value comparison
        total_mismatch_records:
          type: integer
          minimum: 0.0
          title: Total Mismatch Records
          description: Rows in the long-form mismatch table (one per column diff or presence issue)
        is_match:
          type: boolean
          title: Is Match
          description: True when there are zero mismatch records
      type: object
      required:
      - source_row_count
      - target_row_count
      - compared_column_count
      - total_mismatch_records
      - is_match
      title: ValidationSummary
      description: High-level stats for the compared files.
    ValidationTestMode:
      type: string
      enum:
      - litmus
      - full
      title: ValidationTestMode
      description: Execution depth for file validation.
    ValidationUnitSpec:
      properties:
        unit_id:
          type: string
          title: Unit Id
          description: Stable id for UI pairing and per-pair column mapping
        source_paths:
          items:
            type: string
          type: array
          minItems: 1
          title: Source Paths
          description: One or more source files (merged when >1)
        target_paths:
          items:
            type: string
          type: array
          minItems: 1
          title: Target Paths
          description: One or more target files (merged when >1)
        uid_column:
          type: string
          title: Uid Column
          description: Join column for CSV validation
          default: id
        column_mappings:
          items:
            $ref: '#/components/schemas/ColumnMapping'
          type: array
          title: Column Mappings
        fixed_width_config:
          anyOf:
          - $ref: '#/components/schemas/FixedWidthConfig'
          - type: 'null'
          description: Per-pair fixed-width layout when file_format is fixed-width
      type: object
      required:
      - unit_id
      - source_paths
      - target_paths
      title: ValidationUnitSpec
      description: One logical source/target comparison (may merge multiple paths per side).
