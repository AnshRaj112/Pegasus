        target_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Path
          description: Absolute or user-home path to the actual / candidate file on the server
        source_cloud:
          anyOf:
          - $ref: '#/components/schemas/GoogleCloudStorageConfig'
          - type: 'null'
          description: Google Cloud Storage source reference used when the source file is not local
        target_cloud:
          anyOf:
          - $ref: '#/components/schemas/GoogleCloudStorageConfig'
          - type: 'null'
          description: Google Cloud Storage target reference used when the target file is not local
        uid_column:
          type: string
          title: Uid Column
          description: Column name to join on (must exist in both CSV files, ignored for fixed-width)
          default: line
        column_mappings:
          items:
            $ref: '#/components/schemas/ColumnMapping'
          type: array
          title: Column Mappings
          description: Optional source->target column mappings used when header names differ. Each mapped target column is
            renamed to the source column name before comparison.
        delimiter:
          type: string
          title: Delimiter
          description: 'Field separator: auto, tab, or explicit delimiter (ignored for fixed-width)'
          default: auto
        validate_header_formats:
          type: boolean
          title: Validate Header Formats
          description: When true, infer formats on mapped columns and attach compatibility checks to the result.
          default: false
        validate_footers:
          type: boolean
          title: Validate Footers
          description: When true, compare trailing rows between source and target files.
          default: false
        footer_trailing_rows:
          type: integer
          maximum: 10.0
          minimum: 0.0
          title: Footer Trailing Rows
          description: Number of trailing physical rows to treat as footer when validate_footers is true.
          default: 1
        has_header:
          type: boolean
          title: Has Header
          description: When false, the first row is data and columns are named column_1, column_2, … for mapping and UID selection.
          default: true
        header_leading_rows:
          type: integer
          maximum: 50.0
          minimum: 0.0
          title: Header Leading Rows
          description: Number of physical rows at the start of each file to treat as header/preamble and exclude from row-level
            comparison. Applied before has_header.
          default: 0
        file_format:
          type: string
          title: File Format
          description: 'File format: csv, fixed-width, json, parquet, orc, avro, excel, or auto (multi-layer detection when
            auto_detect is enabled on the server)'
          default: csv
        fixed_width_config:
          anyOf:
          - $ref: '#/components/schemas/FixedWidthConfig'
          - type: 'null'
          description: Detailed configuration when file_format is 'fixed-width'
        json_order_sensitive:
          type: boolean
          title: Json Order Sensitive
          description: 'When file_format is json: require list element order and dict key order to match. When false, reordered
            lists and dict keys still match.'
          default: false
        test_mode:
          $ref: '#/components/schemas/ValidationTestMode'
          description: 'litmus: full reconciliation with no snippets; fails immediately when row counts differ; full: full
            reconciliation with capped mismatch snippets (admin default, user-adjustable).'
          default: full
        mismatch_snippet_limit:
          anyOf:
          - type: integer
            maximum: 50.0
            minimum: 1.0
          - type: 'null'
          title: Mismatch Snippet Limit
          description: Per-category snippet cap for full mode (missing, extra, and per-column value mismatches). Defaults
            to the admin-configured value; cannot exceed validation_mismatch_snippet_limit_max.
        uid_gte:
          anyOf:
          - type: string
          - type: 'null'
          title: Uid Gte
          description: 'Optional full-test filter: compare only rows where uid_column >= this value (numeric when possible,
            otherwise lexical string compare).'
      type: object
      title: LocalPathValidateRequest
      description: JSON body for POST /validate/local (server-side paths).
