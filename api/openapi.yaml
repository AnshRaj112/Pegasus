          - type: 'null'
        compression:
          anyOf:
          - $ref: '#/components/schemas/FileDetectionStageResponse'
          - type: 'null'
        encoding:
          anyOf:
          - $ref: '#/components/schemas/FileDetectionStageResponse'
          - type: 'null'
        text_binary:
          anyOf:
          - $ref: '#/components/schemas/FileDetectionStageResponse'
          - type: 'null'
        structured_format:
          anyOf:
          - $ref: '#/components/schemas/FileDetectionStageResponse'
          - type: 'null'
        schema:
