    UpdateQueueSettingsRequest:
      properties:
        max_concurrency:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Max Concurrency
          description: Maximum parallel validation jobs. Running jobs are never killed; the new limit affects when queued
            jobs start.
        auto_tune_enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Auto Tune Enabled
          description: When true, every job that fits current resources starts immediately; the rest wait in the FIFO queue.
            When false, only max_concurrency is used (0 falls back to CPU core count).
        threads_per_job:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Threads Per Job
          description: Threads/processes for partition comparison inside each validation worker. 0 = auto (all logical CPUs
            for that worker).
        disk_headroom_multiplier:
          anyOf:
          - type: number
            maximum: 10.0
            minimum: 1.0
          - type: 'null'
          title: Disk Headroom Multiplier
          description: 'Disk safety factor per job: required free bytes >= multiplier × (source + target CSV size) before
            spill/sort.'
      type: object
      title: UpdateQueueSettingsRequest
      description: JSON body for PATCH /validate/queue — lets users tune concurrency at runtime.
    ValidateResponse:
      properties:
        summary:
          $ref: '#/components/schemas/ValidationSummary'
        mismatch_counts:
          $ref: '#/components/schemas/MismatchCounts'
        mismatch_sample_groups:
          $ref: '#/components/schemas/MismatchSampleGroups'
          description: Missing/extra rows (with source_record / target_record in row_detail when available) up to PEGASUS_VALIDATION_PRESENCE_MISMATCH_RESPONSE_MAX_ROWS
            per side; value_mismatch obeys PEGASUS_VALIDATION_MISMATCH_SAMPLE_LIMIT.
        value_mismatch_by_column:
          additionalProperties:
            type: integer
          type: object
          title: Value Mismatch By Column
          description: Total value_mismatch row counts per compared column (full report, not just samples)
        compared_columns:
          items:
            type: string
          type: array
          title: Compared Columns
          description: Shared non-UID column names that were compared (order is stable for UI grouping)
        run_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Run Id
          description: Database id of the persisted run when PEGASUS_ENABLE_VALIDATION_PERSISTENCE is true
        value_mismatch_by_column_omitted:
          type: boolean
          title: Value Mismatch By Column Omitted
          description: True when per-column value_mismatch_by_column was skipped because value_mismatch row count exceeded
            validation_value_mismatch_column_stats_max_rows (saves memory).
          default: false
        mapping_format_checks:
          items:
            $ref: '#/components/schemas/ColumnMappingFormatCheck'
          type: array
          title: Mapping Format Checks
          description: Present when validate_header_formats was true on the request.
        footer_validation:
          anyOf:
          - $ref: '#/components/schemas/FooterValidationResult'
          - type: 'null'
          description: Present when validate_footers was true on the request.
        durations:
          anyOf:
          - $ref: '#/components/schemas/ValidationDurations'
          - type: 'null'
          description: Wall-clock timings when available from the validation worker.
        test_mode:
          $ref: '#/components/schemas/ValidationTestMode'
          description: Validation depth used for this run.
          default: full
        litmus:
          anyOf:
          - $ref: '#/components/schemas/LitmusComparison'
          - type: 'null'
          description: Present when test_mode is litmus.
        pipeline_metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Pipeline Metadata
          description: Category-1 six-stage pipeline metrics (partition counts, timings, etc.).
