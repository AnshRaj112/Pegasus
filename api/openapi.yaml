components:
  schemas:
    AdminAuthUserResponse:
      properties:
        email:
          type: string
          title: Email
      type: object
      required:
      - email
      title: AdminAuthUserResponse
    AdminLoginRequest:
      properties:
        email:
          type: string
          maxLength: 320
          minLength: 3
          title: Email
        password:
          type: string
          maxLength: 256
          minLength: 1
          title: Password
      type: object
      required:
      - email
      - password
      title: AdminLoginRequest
    AdminSessionStatusResponse:
      properties:
        email:
          type: string
          title: Email
        expires_at:
          type: string
          format: date-time
          title: Expires At
      type: object
      required:
      - email
      - expires_at
      title: AdminSessionStatusResponse
    AdminSignupRequest:
      properties:
        email:
          type: string
          maxLength: 320
          minLength: 3
          title: Email
        password:
          type: string
          maxLength: 256
          minLength: 8
          title: Password
      type: object
      required:
      - email
      - password
      title: AdminSignupRequest
    BatchFailureMode:
      type: string
      enum:
      - stop
      - continue
      title: BatchFailureMode
      description: How to proceed when one validation unit fails in a batch job.
    BatchUnitResult:
      properties:
        unit_id:
          type: string
          title: Unit Id
        source_paths:
          items:
            type: string
          type: array
          title: Source Paths
        target_paths:
          items:
            type: string
          type: array
          title: Target Paths
        status:
          type: string
          title: Status
          description: completed | failed | skipped
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
        result:
          anyOf:
          - $ref: '#/components/schemas/ValidateResponse'
          - type: 'null'
      type: object
      required:
      - unit_id
      - status
      title: BatchUnitResult
      description: Outcome for one unit in a batch validation job.
    BatchValidateResponse:
      properties:
        summary:
          $ref: '#/components/schemas/BatchValidateSummary'
        units:
          items:
            $ref: '#/components/schemas/BatchUnitResult'
          type: array
          title: Units
        on_unit_failure:
          $ref: '#/components/schemas/BatchFailureMode'
          default: continue
        durations:
          anyOf:
          - $ref: '#/components/schemas/ValidationDurations'
          - type: 'null'
      type: object
      required:
      - summary
      title: BatchValidateResponse
      description: Final payload for a completed batch validation job.
    BatchValidateSummary:
      properties:
        total_units:
          type: integer
          minimum: 0.0
          title: Total Units
        completed_units:
          type: integer
          minimum: 0.0
          title: Completed Units
        failed_units:
          type: integer
          minimum: 0.0
          title: Failed Units
        skipped_units:
          type: integer
          minimum: 0.0
          title: Skipped Units
        passed_units:
          type: integer
          minimum: 0.0
          title: Passed Units
          description: Units with zero mismatch records
        is_match:
          type: boolean
          title: Is Match
          description: True when every completed unit has zero mismatches
      type: object
      required:
      - total_units
      - completed_units
      - failed_units
      - skipped_units
      - passed_units
      - is_match
      title: BatchValidateSummary
      description: Aggregate stats across all units in a batch job.
    CloudBrowseEntry:
      properties:
        name:
          type: string
          title: Name
        path:
          type: string
          title: Path
          description: Object name or prefix path within the bucket
        is_dir:
          type: boolean
          title: Is Dir
        size_bytes:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Size Bytes
          description: Object size from GCS metadata (files only; omitted for prefixes)
        created_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Created At
          description: Object creation time from GCS metadata (files only)
        updated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated At
          description: Object last-modified time from GCS metadata (files only)
        owner:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner
          description: Object owner entity from GCS metadata or custom metadata
        created_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Created By
          description: Creator from GCS custom object metadata when present
      type: object
      required:
      - name
      - path
      - is_dir
      title: CloudBrowseEntry
      description: One prefix or object under a GCS browse listing.
    CloudBrowseRequest:
      properties:
        bucket:
          anyOf:
          - type: string
          - type: 'null'
          title: Bucket
        prefix:
          type: string
          title: Prefix
          description: Folder prefix inside the bucket (e.g. data/2024/)
          default: ''
        credentials_json:
          anyOf:
          - type: string
          - type: 'null'
          title: Credentials Json
        connection_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Connection Id
        project_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Project Id
        file_format:
          type: string
          title: File Format
          default: csv
      type: object
      title: CloudBrowseRequest
      description: JSON body for POST /validate/cloud/browse.
    CloudBrowseResponse:
      properties:
        bucket:
          type: string
          title: Bucket
        prefix:
          type: string
          title: Prefix
        parent_prefix:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Prefix
        entries:
          items:
            $ref: '#/components/schemas/CloudBrowseEntry'
