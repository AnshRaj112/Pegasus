openapi: 3.1.0
info:
  title: Pegasus
  version: 0.1.0
paths:
  /api/v1/health:
    get:
      tags:
      - health
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/admin/auth/signup:
    post:
      tags:
      - admin-auth
      summary: Admin Signup
      operationId: admin_signup_api_v1_admin_auth_signup_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSignupRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/auth/login:
    post:
      tags:
      - admin-auth
      summary: Admin Login
      operationId: admin_login_api_v1_admin_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/auth/logout:
    post:
      tags:
      - admin-auth
      summary: Admin Logout
      operationId: admin_logout_api_v1_admin_auth_logout_post
      parameters:
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/auth/me:
    get:
      tags:
      - admin-auth
      summary: Admin Me
      operationId: admin_me_api_v1_admin_auth_me_get
      parameters:
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuthUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/auth/session:
    get:
      tags:
      - admin-auth
      summary: Admin Session Status
      operationId: admin_session_status_api_v1_admin_auth_session_get
      parameters:
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/auth/extend:
    post:
      tags:
      - admin-auth
      summary: Admin Extend Session
      operationId: admin_extend_session_api_v1_admin_auth_extend_post
      parameters:
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/cloud-connections:
    get:
      tags:
      - admin
      summary: List Cloud Connections
      operationId: list_cloud_connections_api_v1_admin_cloud_connections_get
      parameters:
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CloudConnectionResponse'
                title: Response List Cloud Connections Api V1 Admin Cloud Connections Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - admin
      summary: Create Cloud Connection
      operationId: create_cloud_connection_api_v1_admin_cloud_connections_post
      parameters:
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudConnectionCreateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudConnectionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admin/cloud-connections/{connection_id}:
    patch:
      tags:
      - admin
      summary: Update Cloud Connection
      operationId: update_cloud_connection_api_v1_admin_cloud_connections__connection_id__patch
      parameters:
      - name: connection_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Connection Id
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudConnectionUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudConnectionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - admin
      summary: Delete Cloud Connection
      operationId: delete_cloud_connection_api_v1_admin_cloud_connections__connection_id__delete
      parameters:
      - name: connection_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Connection Id
      - name: pegasus_admin_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pegasus Admin Session
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/options:
    get:
      tags:
      - validation
      summary: Validation wizard options (test modes and snippet limits)
      operationId: validation_options_api_v1_validate_options_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationOptionsResponse'
  /api/v1/validate/local/browse/config:
    get:
      tags:
      - validation
      summary: Default browse directory and Docker path remap settings for the file picker
      operationId: get_local_browse_config_api_v1_validate_local_browse_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalPathBrowseConfigResponse'
        '403':
          description: Local path validation disabled
  /api/v1/validate/local/browse:
    get:
      tags:
      - validation
      summary: List files and folders under a server directory (local-path picker)
      operationId: browse_local_directory_api_v1_validate_local_browse_get
      parameters:
      - name: path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Absolute directory to list; defaults to configured browse root when omitted
          title: Path
        description: Absolute directory to list; defaults to configured browse root when omitted
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalBrowseResponse'
        '400':
          description: Path not found or not a directory
        '403':
          description: Local path validation disabled
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/local/detect:
    get:
      tags:
      - validation
      summary: Multi-layer file type detection report for a local path
      operationId: detect_local_file_api_v1_validate_local_detect_get
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
          description: Absolute file path to inspect
          title: Path
        description: Absolute file path to inspect
      - name: file_format
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Declared format hint (csv, auto, parquet, …)
          title: File Format
        description: Declared format hint (csv, auto, parquet, …)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDetectionResponse'
        '400':
          description: Invalid path
        '403':
          description: Local path validation disabled
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/local/columns:
    get:
      tags:
      - validation
      summary: Preview source and target headers for mapping
      operationId: preview_local_csv_columns_api_v1_validate_local_columns_get
      parameters:
      - name: source_path
        in: query
        required: true
        schema:
          type: string
          description: Absolute source file path
          title: Source Path
        description: Absolute source file path
      - name: target_path
        in: query
        required: true
        schema:
          type: string
          description: Absolute target file path
          title: Target Path
        description: Absolute target file path
      - name: uid_column
        in: query
        required: false
        schema:
          type: string
          description: Join key column to exclude from compare mapping
          default: id
          title: Uid Column
        description: Join key column to exclude from compare mapping
      - name: delimiter
        in: query
        required: false
        schema:
          type: string
          description: Field separator or auto
          default: auto
          title: Delimiter
        description: Field separator or auto
      - name: has_header
        in: query
        required: false
        schema:
          type: boolean
          description: Whether the first row contains column names
          default: true
          title: Has Header
        description: Whether the first row contains column names
      - name: header_leading_rows
        in: query
        required: false
        schema:
          type: integer
          description: Leading rows to skip before reading columns
          default: 0
          title: Header Leading Rows
        description: Leading rows to skip before reading columns
      - name: file_format
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: File format or auto (inferred from extension)
          title: File Format
        description: File format or auto (inferred from extension)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalColumnPreviewResponse'
        '400':
          description: Invalid paths or delimiter
        '403':
          description: Local path validation disabled
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - validation
      summary: Preview source and target headers for mapping (body variant)
      operationId: preview_local_csv_columns_body_api_v1_validate_local_columns_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalPathValidateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalColumnPreviewResponse'
        '400':
          description: Invalid paths, cloud inputs, or delimiter
        '403':
          description: Local path validation disabled
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/local/fixed-width-layout:
    post:
      tags:
      - validation
      summary: Infer fixed-width column slices and date formats for mapping
      operationId: preview_fixed_width_layout_body_api_v1_validate_local_fixed_width_layout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalPathValidateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixedWidthLayoutPreviewResponse'
        '400':
          description: Invalid paths, cloud inputs, or unreadable files
        '403':
          description: Local path validation disabled
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/local/json-parent-preview:
    post:
      tags:
      - validation
      summary: Discover top-level JSON parents and suggest mappings
      description: Return top-level JSON parent keys for source/target and auto-suggested pairings.
      operationId: preview_json_parent_mapping_api_v1_validate_local_json_parent_preview_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalPathValidateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonParentPreviewResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/cloud/browse:
    post:
      tags:
      - validation
      summary: Browse GCS bucket prefixes and objects for the cloud file picker
      description: List child prefixes and objects under a bucket prefix (delimiter='/').
      operationId: browse_cloud_prefix_api_v1_validate_cloud_browse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudBrowseRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudBrowseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/cloud/profile:
    post:
      tags:
      - validation
      summary: Detect format and count rows/columns for a GCS object
      description: Run file-type detection and profile shape stats from GCS metadata + prefix sample.
      operationId: profile_cloud_file_api_v1_validate_cloud_profile_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudFileProfileRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudFileProfileResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/cloud/match-pairs:
    post:
      tags:
      - validation
      summary: Auto-match GCS objects between two prefixes by filename
      description: Suggest 1:1 object pairs from two bucket prefixes (basename match).
      operationId: match_cloud_file_pairs_api_v1_validate_cloud_match_pairs_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudMatchFilePairsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchFilePairsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/local/match-pairs:
    post:
      tags:
      - validation
      summary: Auto-match files between two directories by filename
      operationId: match_local_file_pairs_api_v1_validate_local_match_pairs_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchFilePairsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchFilePairsResponse'
        '400':
          description: Invalid directories
        '403':
          description: Local path validation disabled
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/local:
    post:
      tags:
      - validation
      summary: Queue comparison of two on-disk files by UID (no upload)
      operationId: validate_csv_local_paths_api_v1_validate_local_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalPathValidateRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationJobAcceptedResponse'
        '400':
          description: Invalid paths, delimiter, or missing uid column
        '403':
          description: Local path validation disabled
        '422':
          description: Comparison cannot run (e.g. duplicate UIDs)
  /api/v1/validate/local/batch:
    post:
      tags:
      - validation
      summary: Queue batch comparison of multiple local file pairs
      operationId: validate_csv_local_batch_api_v1_validate_local_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalBatchValidateRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationJobAcceptedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/jobs/{job_id}:
    get:
      tags:
      - validation
      summary: Poll a queued validation job
      operationId: get_validation_job_api_v1_validate_jobs__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Job Id
      - name: summary_only
        in: query
        required: false
        schema:
          type: boolean
          description: When true (recommended for UI), return counts and metadata only without scanning the full mismatch
            artifact. Mismatch rows are available via GET /validate/jobs/{job_id}/mismatches or history mismatches.
          default: false
          title: Summary Only
        description: When true (recommended for UI), return counts and metadata only without scanning the full mismatch artifact.
          Mismatch rows are available via GET /validate/jobs/{job_id}/mismatches or history mismatches.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationJobDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/jobs/{job_id}/mismatches:
    get:
      tags:
      - validation
      summary: Paginated mismatch rows for a completed validation job (reads on-disk NDJSON)
      operationId: list_validation_job_mismatches_api_v1_validate_jobs__job_id__mismatches_get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Job Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 5000
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: mismatch_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by missing_in_target | extra_in_target | value_mismatch
          title: Mismatch Type
        description: Filter by missing_in_target | extra_in_target | value_mismatch
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationHistoryMismatchesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/queue:
    get:
      tags:
      - validation
      summary: Get validation job queue status, CPU info, and job list
      operationId: get_validation_queue_status_api_v1_validate_queue_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStatusResponse'
    patch:
      tags:
      - validation
      summary: Update queue settings (e.g. max parallel validations)
      operationId: update_validation_queue_settings_api_v1_validate_queue_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQueueSettingsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/validate/history:
    get:
      tags:
      - validation-history
      summary: List persisted validation runs (newest first)
      operationId: list_validation_history_api_v1_validate_history_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: source_path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter to runs for this source file path
          title: Source Path
        description: Filter to runs for this source file path
      - name: target_path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter to runs for this target file path
          title: Target Path
        description: Filter to runs for this target file path
      - name: kind
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: validation = completed/failed runs; mapping = saved/active mappings
          title: Kind
        description: validation = completed/failed runs; mapping = saved/active mappings
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationHistoryListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - validation-history
      summary: Delete persisted validation runs (either all history or for a specific file pair)
      operationId: delete_validation_history_api_v1_validate_history_delete
      parameters:
      - name: source_path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Source file path to delete history for
          title: Source Path
        description: Source file path to delete history for
      - name: target_path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Target file path to delete history for
