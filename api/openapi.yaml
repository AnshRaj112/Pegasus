    CloudConnectionUpdateRequest:
      properties:
        name:
          anyOf:
          - type: string
            maxLength: 128
            minLength: 1
          - type: 'null'
          title: Name
        provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
        bucket:
          anyOf:
          - type: string
          - type: 'null'
          title: Bucket
        project_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Project Id
        credentials_json:
          anyOf:
          - type: string
            minLength: 2
          - type: 'null'
          title: Credentials Json
        active:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Active
      type: object
      title: CloudConnectionUpdateRequest
    CloudFileProfileRequest:
      properties:
        cloud:
          $ref: '#/components/schemas/GoogleCloudStorageConfig'
        delimiter:
          type: string
          title: Delimiter
          description: Field separator or auto
          default: auto
        has_header:
          type: boolean
          title: Has Header
