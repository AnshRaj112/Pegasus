          title: Entries
        truncated:
          type: boolean
          title: Truncated
          default: false
      type: object
      required:
      - bucket
      - prefix
      title: CloudBrowseResponse
      description: GCS prefix listing for the cloud file picker.
    CloudConnectionCreateRequest:
