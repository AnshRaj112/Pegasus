          default: true
      type: object
      required:
      - cloud
      title: CloudFileProfileRequest
      description: JSON body for POST /validate/cloud/profile.
    CloudFileProfileResponse:
      properties:
        object_name:
          type: string
          title: Object Name
        gcs_uri:
          type: string
          title: Gcs Uri
        file_size_bytes:
          type: integer
          minimum: 0.0
          title: File Size Bytes
        file_format:
          type: string
          title: File Format
          description: Detected format label (csv, fixed-width, parquet, …)
        suggested_file_format:
          anyOf:
          - type: string
          - type: 'null'
          title: Suggested File Format
        dataset_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Dataset Model
        column_count:
          type: integer
          minimum: 0.0
          title: Column Count
        row_count:
          type: integer
          minimum: 0.0
          title: Row Count
        delimiter:
          anyOf:
          - type: string
          - type: 'null'
          title: Delimiter
        has_header:
          type: boolean
          title: Has Header
          default: true
        inferred_has_header:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Inferred Has Header
          description: Content-inferred header row presence (delimited files only).
        json_preview:
          anyOf:
          - type: string
          - type: 'null'
          title: Json Preview
          description: Pretty-printed JSON prefix for overview preview (JSON documents only).
        archive_entry_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Archive Entry Count
          description: Number of file entries in an archive container.
        archive_entries_sample:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Archive Entries Sample
          description: Sample of archive member paths (first 20).
        archive_manifest_supported:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Archive Manifest Supported
          description: Whether metadata-only manifest comparison is available.
        archive_warnings:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Archive Warnings
          description: Warnings from archive metadata inspection.
      type: object
      required:
      - object_name
      - gcs_uri
      - file_size_bytes
      - file_format
      - column_count
      - row_count
      title: CloudFileProfileResponse
      description: Detected format and shape stats for one GCS object.
    CloudMatchFilePairsRequest:
      properties:
        bucket:
          anyOf:
          - type: string
          - type: 'null'
          title: Bucket
        source_prefix:
          type: string
          title: Source Prefix
          default: ''
        target_prefix:
          type: string
          title: Target Prefix
          default: ''
        credentials_json:
          anyOf:
          - type: string
          - type: 'null'
          title: Credentials Json
        connection_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Connection Id
        project_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Project Id
        file_format:
          type: string
          title: File Format
          default: csv
        recursive:
          type: boolean
          title: Recursive
          default: false
      type: object
      title: CloudMatchFilePairsRequest
      description: JSON body for POST /validate/cloud/match-pairs.
    ColumnMapping:
      properties:
        source_column:
          type: string
          title: Source Column
          description: Logical source column name (reporting key and primary source field)
        target_column:
          type: string
          title: Target Column
          description: Primary target column name (defaults to source_column when empty)
          default: ''
        source_columns:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Source Columns
          description: Optional extra source columns for many-to-one mapping (N source -> 1 target)
        target_columns:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Target Columns
          description: Optional extra target columns for one-to-many mapping (1 source -> N targets)
        compare_mode:
          type: string
          title: Compare Mode
          description: 'How to compare values: auto (smart dates), text (exact string), date (calendar date with optional
            formats), phone (digits only), digits (digits only), structured (list/dict/tuple literals in cells)'
          default: auto
        structured_order_sensitive:
          type: boolean
          title: Structured Order Sensitive
          description: 'When compare_mode is structured: require list/tuple element order and dict key order to match. When
            false, order is ignored but values and spelling must still match.'
          default: false
        source_date_format:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Date Format
          description: strptime/friendly date format for source when compare_mode is date
        target_date_format:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Date Format
          description: strptime/friendly date format for target when compare_mode is date
        source_strip_prefix:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Strip Prefix
          description: Remove this prefix from source values before compare (e.g. +91)
        target_strip_prefix:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Strip Prefix
          description: Remove this prefix from target values before compare
        source_regex_pattern:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Regex Pattern
          description: Optional regex applied to source value before compare
        source_regex_replacement:
          type: string
          title: Source Regex Replacement
          description: Replacement for source_regex_pattern
          default: ''
        target_regex_pattern:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Regex Pattern
          description: Optional regex applied to target value before compare
        target_regex_replacement:
          type: string
          title: Target Regex Replacement
          description: Replacement for target_regex_pattern
          default: ''
        is_sensitive:
          type: boolean
          title: Is Sensitive
          description: When true, mismatch output values for this column are masked (e.g. ****) to protect PII.
          default: false
      type: object
      required:
      - source_column
      title: ColumnMapping
      description: Map source column(s) to target column(s) for reconciliation.
    ColumnMappingFormatCheck:
      properties:
        source_column:
          type: string
          title: Source Column
        target_column:
          type: string
          title: Target Column
        source_format:
          type: string
          title: Source Format
        target_format:
          type: string
          title: Target Format
        source_confidence:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Source Confidence
        target_confidence:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Target Confidence
        compatible:
          type: boolean
          title: Compatible
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        source_example:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Example
        target_example:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Example
      type: object
      required:
      - source_column
      - target_column
      - source_format
      - target_format
      - source_confidence
      - target_confidence
      - compatible
      title: ColumnMappingFormatCheck
      description: Format compatibility for one source→target column mapping.
    FileDetectionResponse:
      properties:
